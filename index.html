<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mural News</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <main class="pagina">
    <nav class="menu-superior" aria-label="Navegação principal">
      <a class="marca" href="index.html">Dinamismo na WEB</a>
      <div class="links-menu">
        <a href="#tituloPosts">Posts</a>
        <a href="#tituloUsuarios">Autores</a>
      </div>
    </nav>

    <section class="barra-status" aria-label="Resumo">
      <p id="mensagem" aria-live="polite">Carregando...</p>

      <dl class="numeros">
        <div>
          <dt>Usuários</dt>
          <dd id="totalUsuarios">0</dd>
        </div>
        <div>
          <dt>Posts</dt>
          <dd id="totalPosts">0</dd>
        </div>
      </dl>
    </section>

    <section class="grade">
      <section class="painel painel-posts" aria-labelledby="tituloPosts">
        <div class="painel-cabecalho">
          <h2 id="tituloPosts">Posts</h2>
        </div>

        <form id="formPost" class="formulario" autocomplete="off">
          <input type="hidden" id="idPost">

          <label for="tituloPost">Título</label>
          <input type="text" id="tituloPost" placeholder="Título do post" required>

          <label for="textoPost">Texto</label>
          <textarea id="textoPost" rows="4" placeholder="Escreva o recado" required></textarea>

          <label for="autorPost">Autor</label>
          <select id="autorPost" required></select>

          <div class="acoes-form">
            <button type="submit" id="btnPost">Adicionar</button>
            <button type="button" id="cancelarPost" class="botao-secundario" hidden>Cancelar</button>
          </div>
        </form>

        <div id="listaPosts" class="lista-cards lista-noticias" aria-live="polite"></div>
      </section>

      <aside class="painel painel-autores" aria-labelledby="tituloUsuarios">
        <div class="painel-cabecalho">
          <h2 id="tituloUsuarios">Autores</h2>
        </div>

        <div id="listaUsuarios" class="lista-cards lista-autores" aria-live="polite"></div>
      </aside>
    </section>
  </main>

  <footer class="rodape">
    <p>Dinamismo na Web</p>
  </footer>
</body>
</html>
